<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1 class="text-center">Rock paper Scissors Game!</h1>
    </header>

    <section class="container-score">
      <div class="human-score-container">
        <p>Player</p>
        <p class="human-score">0</p>
      </div>
      <div class="computer-score-container">
        <p>Computer</p>
        <p class="computer-score">0</p>
      </div>
    </section>
    <main>
      <div class="round-board text-center">
        ROUND <span class="current-round">0</span> of
        <span class="max-rounds">5</span>
      </div>
      <section class="human-side-section">
        <h2 class="large-billboard-text text-center">Make Your Move!</h2>
        <div class="container-btn">
          <button id="rock" class="btn-rock btn-rps">
            <div>🪨</div>
            <span>Rock</span>
          </button>
          <button id="paper" class="btn-paper btn-rps">
            <div>📜</div>
            <span>Paper</span>
          </button>
          <button id="scissors" class="btn-scissors btn-rps">
            <div>✂️</div>
            <span>Scissors</span>
          </button>
        </div>
      </section>
    </main>
    <script src="index.js"></script>
  </body>
</html>
